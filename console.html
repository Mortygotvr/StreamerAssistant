<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamer Assistant - Trigger Console</title>
    <style>
        :root { --bg: #1e1e1e; --text: #f0f0f0; --accent: #007acc; --border: #333; }
        body { font-family: 'Consolas', 'Courier New', monospace; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        header { background: #252526; padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; align-content: center;}
        .status { width: 12px; height: 12px; border-radius: 50%; background: #d32f2f; display: inline-block; }
        .status.connected { background: #4caf50; }
        #controls { display: flex; gap: 15px; font-size: 0.9em; user-select: none; }
        #log-container { flex-grow: 1; overflow-y: auto; padding: 10px 20px; box-sizing: border-box; }
        .log-entry { margin-bottom: 6px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); word-wrap: break-word; }
        .timestamp { color: #888; margin-right: 10px; }
        .log-type { padding: 2px 6px; border-radius: 3px; font-size: 0.85em; font-weight: bold; margin-right: 10px; display: inline-block; min-width: 60px; text-align: center; }
        
        .type-alert { background: #e65100; color: white; }
        .type-chat { background: #004d40; color: white; }
        .type-mod { background: #4a148c; color: white; }
        .type-system { background: #424242; color: white; }
        
        .highlight-trigger { color: #53fc18; font-weight: bold; }
        .json-dump { font-size: 0.85em; color: #888; margin-top: 6px; display: block; font-family: inherit; white-space: pre-wrap; background: #181818; padding: 8px; border-radius: 4px; border: 1px solid #333; max-height: 300px; overflow-y: auto;}
        
        button { background: var(--accent); color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-family: inherit; margin-left: 15px;}
        button:hover { opacity: 0.8; }
        label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<header>
    <h1><span id="ws-status" class="status"></span> SAMMI Event Console</h1>
    <div id="controls">
        <label><input type="checkbox" id="show-chat"> Show Raw Chat</label>
        <label><input type="checkbox" id="show-alerts" checked> Show SAMMI Triggers</label>
        <label><input type="checkbox" id="show-system"> Show System Events</label>
        <label><input type="checkbox" id="show-raw" onchange="toggleRaw()"> Show Raw JSON</label>
        <button onclick="saveLog()">Save Log to File</button>
        <button onclick="clearLog()">Clear Console</button>
    </div>
</header>

<div id="log-container"></div>

<script>
    const logContainer = document.getElementById('log-container');
    const statusIndicator = document.getElementById('ws-status');
    
    let ws;
    let logHistory = []; // Store raw messages

    function connect() {
        ws = new WebSocket('ws://localhost:41837');
        
        ws.onopen = () => {
            statusIndicator.classList.add('connected');
            logSystem('Connected to StreamerAssistant WebSocket Server. Listening for events...');
        };
        
        ws.onclose = () => {
            statusIndicator.classList.remove('connected');
            logSystem('Disconnected. Waiting for StreamerAssistant.exe...');
            setTimeout(connect, 3000);
        };
        
        ws.onerror = (err) => {
            // Silently handle to prevent spam on disconnects
        };

        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                
                // Add to history for exporting
                logHistory.push({
                    timestamp: new Date().toISOString(),
                    payload: data
                });

                // Filters
                const showChat = document.getElementById('show-chat').checked;
                const showAlerts = document.getElementById('show-alerts').checked;
                const showSystem = document.getElementById('show-system').checked;

                if (data.type === 'chat' || data.type === 'whisper') {
                    if (!showChat) return;
                    addLog('CHAT', 'type-chat', `[${data.source}] ${data.username}: ${data.message}`, data);
                } 
                else if (data.type === 'alert') {
                    if (!showAlerts) return;
                      addLog('ALERT', 'type-alert', `[${data.source}] Event Detected -> <span class="highlight-trigger">${data.trigger}</span>`, data);
                }
                else if (data.type === 'moderation') {
                    if (!showAlerts) return;
                    const p = data.payload || {};
                    // This is the actual payload sent to SAMMI inside the python loop
                    addLog('SAMMI', 'type-mod', `Webhook Sent -> <span class="highlight-trigger">${p.trigger || "Unknown"}</span>`, p);
                }
                else if (data.type === 'config_state' || data.type === 'tts_info' || data.type === 'status') {
                    if (!showSystem) return;
                    addLog('SYS', 'type-system', `Received internal system sync: ${data.type}`);
                }
                else {
                    if (!showSystem) return;
                    addLog('UNK', 'type-system', `Unknown Message Type: ${data.type}`, data);
                }

            } catch(e) {
                console.error("Parse Error:", e, event.data);
            }
        };
    }

    function logSystem(msg) {
        addLog('SYS', 'type-system', msg);
    }

    function addLog(typeLabel, typeClass, messageHtml, jsonData = null) {
        const time = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.className = 'log-entry';
        
        let html = `<span class="timestamp">[${time}]</span>`;
        html += `<span class="log-type ${typeClass}">${typeLabel}</span> `;
        html += `<span>${messageHtml}</span>`;
        
        if (jsonData && Object.keys(jsonData).length > 0) {
            const showRaw = document.getElementById('show-raw').checked;
            html += `<div class="json-dump" style="display: ${showRaw ? 'block' : 'none'};">${JSON.stringify(jsonData, null, 2)}</div>`;
        }
        
        div.innerHTML = html;
        logContainer.appendChild(div);
        
        // Auto scroll to bottom
        logContainer.scrollTop = logContainer.scrollHeight;
    }

    function toggleRaw() {
        const showRaw = document.getElementById('show-raw').checked;
        const dumps = document.querySelectorAll('.json-dump');
        dumps.forEach(d => {
            d.style.display = showRaw ? 'block' : 'none';
        });
    }

    function clearLog() {
        document.getElementById('log-container').innerHTML = '';
        logHistory = [];
    }

    function saveLog() {
        if (logHistory.length === 0) {
            alert("No logs to save!");
            return;
        }

        const dataStr = JSON.stringify(logHistory, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        const now = new Date().toISOString().replace(/[:.]/g, "-");
        a.href = url;
        a.download = `streamer_assistant_log_${now}.json`;
        document.body.appendChild(a);
        a.click();
        
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // Start connection process
    connect();
</script>
</body>
</html>
